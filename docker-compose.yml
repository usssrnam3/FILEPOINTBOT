services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: filepoint
      POSTGRES_USER: filepoint
      POSTGRES_PASSWORD: filepoint
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filepoint -d filepoint"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:
  redis_data:

